version: '3.8'

services:
  qwen2-5-1-5b:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qwen2-5-1-5b-api
    ports:
      - "8001:8001"
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - MODEL_PATH=${MODEL_PATH:-Qwen/Qwen2.5-1.5B-Instruct}
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount model cache if using local models
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - app-center-network

networks:
  app-center-network:
    external: true
    name: app-center-network

